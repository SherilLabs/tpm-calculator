<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator TPM</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2966/2966486.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="wrapper">

    <div class="container">

        <div class="header">
            <div class="badge">💉 Nursing Tool</div>
            <h1>Kalkulator TPM Infus</h1>
            <p>Hitung tetesan per menit secara cepat dan akurat</p>
        </div>

        <p>Volume Cairan (mL)</p>
        <input type="number" id="volume" placeholder="Masukkan volume cairan dalam mL">

        <p>Jam</p>
        <input type="number" id="jam" placeholder="Masukkan durasi dalam jam">

        <p>Menit</p>
        <input type="number" id="menit" placeholder="Masukkan menit">

        <p>Faktor Tetes</p>
        <select id="faktor">
            <option>15</option>
            <option>20</option>
            <option>60</option>
        </select>

        <button onclick="hitungTPM()">Hitung</button>

        <!-- HASIL -->
        <div class="hasil-box">
            <h2 id="hasil">TPM: -</h2>
        </div>

    </div>

    <!-- FOOTER (SUDAH BENAR POSISI) -->
    <footer class="footer">
        © 2026 Sheril Ulya Sabrina • 
        <a href="https://sherillabs.github.io/tpm-calculator/" target="_blank">
            tpm-calculator
        </a>
    </footer>

</div>

<script src="script.js"></script>

</body>
</html>
